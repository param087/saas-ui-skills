<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM pipeline · saas-ui-skills</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./theme.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen">
    <header class="sticky top-0 z-20 border-b bg-background/80 backdrop-blur">
      <div class="mx-auto flex h-14 max-w-6xl items-center gap-3 px-4">
        <a href="./index.html" class="inline-flex items-center gap-1.5 text-sm text-muted-foreground transition-colors hover:text-foreground">
          <i data-lucide="arrow-left" class="h-4 w-4"></i> Gallery
        </a>
        <div class="h-4 w-px bg-border"></div>
        <h1 class="text-sm font-semibold">CRM pipeline</h1>
        <span class="hidden rounded-full border px-2 py-0.5 text-xs text-muted-foreground sm:inline">data-tables</span>
        <button type="button" onclick="toggleTheme()" aria-label="Toggle dark mode" class="ml-auto inline-flex h-8 w-8 items-center justify-center rounded-md border transition-colors hover:bg-muted">
          <i data-lucide="sun-moon" class="h-4 w-4"></i>
        </button>
      </div>
    </header>

    <main class="mx-auto max-w-3xl px-4 py-10">
      <div class="rounded-xl border">
        <div class="flex items-center justify-between border-b px-4 py-3">
          <h2 class="text-sm font-semibold">Pipeline</h2>
          <p class="text-sm text-muted-foreground">Open value <span class="font-medium text-foreground tabular-nums">$42,500</span></p>
        </div>
        <table class="w-full caption-bottom text-sm">
          <thead class="sticky top-14 bg-background [&_tr]:border-b">
            <tr class="border-b transition-colors">
              <th class="h-11 px-4 text-left align-middle font-medium text-muted-foreground">Company</th>
              <th class="h-11 px-4 text-left align-middle font-medium text-muted-foreground">Stage</th>
              <th class="h-11 px-4 text-left align-middle font-medium text-muted-foreground">Owner</th>
              <th class="h-11 px-4 text-right align-middle font-medium text-muted-foreground">Value</th>
              <th class="h-11 px-4 text-right align-middle font-medium text-muted-foreground">Close</th>
            </tr>
          </thead>
          <tbody>
            <tr class="cursor-pointer border-b transition-colors hover:bg-muted/50">
              <td class="p-4 align-middle font-medium">Northwind</td>
              <td class="p-4 align-middle"><span class="inline-flex items-center rounded-full border border-transparent px-2.5 py-0.5 text-xs font-medium bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-300">Proposal</span></td>
              <td class="p-4 align-middle"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-muted text-[10px] font-medium">PB</span></td>
              <td class="p-4 text-right align-middle tabular-nums">$24,000</td>
              <td class="p-4 text-right align-middle text-muted-foreground">Jun 18</td>
            </tr>
            <tr class="cursor-pointer border-b transition-colors hover:bg-muted/50">
              <td class="p-4 align-middle font-medium">Acme Corp</td>
              <td class="p-4 align-middle"><span class="inline-flex items-center rounded-full border border-transparent px-2.5 py-0.5 text-xs font-medium bg-blue-100 text-blue-700 dark:bg-blue-950 dark:text-blue-300">Qualified</span></td>
              <td class="p-4 align-middle"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-muted text-[10px] font-medium">JD</span></td>
              <td class="p-4 text-right align-middle tabular-nums">$12,500</td>
              <td class="p-4 text-right align-middle text-muted-foreground">Jun 24</td>
            </tr>
            <tr class="cursor-pointer border-b transition-colors hover:bg-muted/50">
              <td class="p-4 align-middle font-medium">Globex</td>
              <td class="p-4 align-middle"><span class="inline-flex items-center rounded-full border border-transparent px-2.5 py-0.5 text-xs font-medium bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300">Won</span></td>
              <td class="p-4 align-middle"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-muted text-[10px] font-medium">AK</span></td>
              <td class="p-4 text-right align-middle tabular-nums">$48,000</td>
              <td class="p-4 text-right align-middle text-muted-foreground">Jun 02</td>
            </tr>
            <tr class="cursor-pointer transition-colors hover:bg-muted/50">
              <td class="p-4 align-middle font-medium">Initech</td>
              <td class="p-4 align-middle"><span class="inline-flex items-center rounded-full border border-transparent px-2.5 py-0.5 text-xs font-medium bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300">Lead</span></td>
              <td class="p-4 align-middle"><span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-muted text-[10px] font-medium">MR</span></td>
              <td class="p-4 text-right align-middle tabular-nums">$6,000</td>
              <td class="p-4 text-right align-middle text-muted-foreground">Jul 09</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
