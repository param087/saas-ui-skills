<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analytics bento · saas-ui-skills</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./theme.js"></script>
    <link rel="stylesheet" href="./theme.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="min-h-screen">
    <header class="sticky top-0 z-20 border-b bg-background/80 backdrop-blur">
      <div class="mx-auto flex h-14 max-w-6xl items-center gap-3 px-4">
        <a href="./index.html" class="inline-flex items-center gap-1.5 text-sm text-muted-foreground transition-colors hover:text-foreground">
          <i data-lucide="arrow-left" class="h-4 w-4"></i> Gallery
        </a>
        <div class="h-4 w-px bg-border"></div>
        <h1 class="text-sm font-semibold">Analytics bento</h1>
        <span class="hidden rounded-full border px-2 py-0.5 text-xs text-muted-foreground sm:inline">dashboard-layout</span>
        <button type="button" onclick="toggleTheme()" aria-label="Toggle dark mode" class="ml-auto inline-flex h-8 w-8 items-center justify-center rounded-md border transition-colors hover:bg-muted">
          <i data-lucide="sun-moon" class="h-4 w-4"></i>
        </button>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-10">
      <section class="grid auto-rows-[minmax(0,1fr)] grid-cols-2 gap-4 lg:grid-cols-4">
        <!-- Hero metric -->
        <div class="col-span-2 overflow-hidden rounded-xl border-0 bg-gradient-to-br from-violet-600 to-indigo-600 text-white shadow-sm lg:row-span-2">
          <div class="flex flex-col space-y-1.5 p-6">
            <p class="flex items-center gap-1.5 text-sm text-violet-100"><i data-lucide="sparkles" class="h-4 w-4"></i> Revenue this month</p>
            <p class="text-4xl font-semibold tabular-nums">$418,920</p>
          </div>
          <div class="p-6 pt-0">
            <p class="text-sm text-violet-100"><span class="font-medium text-white">+14.2%</span> vs last month</p>
            <div class="mt-4 h-32 rounded-lg bg-white/10 p-3 ring-1 ring-inset ring-white/15">
              <svg viewBox="0 0 320 96" preserveAspectRatio="none" class="h-full w-full" role="img" aria-label="Revenue trend">
                <polyline points="0,80 40,68 80,72 120,50 160,58 200,34 240,42 280,20 320,26" fill="none" stroke="white" stroke-opacity="0.9" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />
              </svg>
            </div>
          </div>
        </div>

        <!-- KPI tiles -->
        <div class="rounded-xl border bg-card text-card-foreground shadow-sm">
          <div class="flex flex-col space-y-1.5 p-6 pb-2"><p class="text-sm text-muted-foreground">Sessions</p><p class="text-2xl font-semibold tabular-nums">82,402</p></div>
          <div class="p-6 pt-0"><span class="inline-flex items-center gap-0.5 text-xs font-medium text-emerald-600"><i data-lucide="arrow-up-right" class="h-3.5 w-3.5"></i><span class="tabular-nums">9.1%</span></span></div>
        </div>
        <div class="rounded-xl border bg-card text-card-foreground shadow-sm">
          <div class="flex flex-col space-y-1.5 p-6 pb-2"><p class="text-sm text-muted-foreground">Conversion</p><p class="text-2xl font-semibold tabular-nums">3.84%</p></div>
          <div class="p-6 pt-0"><span class="inline-flex items-center gap-0.5 text-xs font-medium text-emerald-600"><i data-lucide="arrow-up-right" class="h-3.5 w-3.5"></i><span class="tabular-nums">0.6%</span></span></div>
        </div>
        <div class="rounded-xl border bg-card text-card-foreground shadow-sm">
          <div class="flex flex-col space-y-1.5 p-6 pb-2"><p class="text-sm text-muted-foreground">Avg. order</p><p class="text-2xl font-semibold tabular-nums">$128.40</p></div>
          <div class="p-6 pt-0"><span class="inline-flex items-center gap-0.5 text-xs font-medium text-rose-600"><i data-lucide="arrow-down-right" class="h-3.5 w-3.5"></i><span class="tabular-nums">2.3%</span></span></div>
        </div>

        <!-- Channels -->
        <div class="col-span-2 rounded-xl border bg-card text-card-foreground shadow-sm">
          <div class="flex flex-row items-center justify-between space-y-0 p-6">
            <h3 class="text-base font-semibold leading-none tracking-tight">Top channels</h3>
            <span class="inline-flex items-center rounded-full border border-transparent bg-secondary px-2.5 py-0.5 text-xs font-semibold text-secondary-foreground">Live</span>
          </div>
          <div class="p-6 pt-0">
            <ul class="space-y-2 text-sm">
              <li class="flex items-center gap-3"><span class="w-20 text-muted-foreground">Organic</span><span class="h-2 flex-1 overflow-hidden rounded-full bg-muted"><span class="block h-full rounded-full bg-violet-500" style="width:42%"></span></span><span class="w-10 text-right tabular-nums text-muted-foreground">42%</span></li>
              <li class="flex items-center gap-3"><span class="w-20 text-muted-foreground">Direct</span><span class="h-2 flex-1 overflow-hidden rounded-full bg-muted"><span class="block h-full rounded-full bg-violet-500" style="width:28%"></span></span><span class="w-10 text-right tabular-nums text-muted-foreground">28%</span></li>
              <li class="flex items-center gap-3"><span class="w-20 text-muted-foreground">Referral</span><span class="h-2 flex-1 overflow-hidden rounded-full bg-muted"><span class="block h-full rounded-full bg-violet-500" style="width:18%"></span></span><span class="w-10 text-right tabular-nums text-muted-foreground">18%</span></li>
            </ul>
          </div>
        </div>
      </section>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
